<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-TRACT VIP v3.2 | Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .pro-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 0, 85, 0.3); border-radius: 1.5rem; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #ff0055); width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-black text-pink-600 italic">X-TRACT <span class="text-white">ULTRA</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.3em] mt-1">BYPASS ENGINE v3.2</p>
        </header>

        <div class="pro-card p-6 space-y-4">
            <input type="text" id="videoUrl" placeholder="貼上 YouTube 或成人網站網址..." 
                   class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-4 text-white outline-none focus:border-pink-600">
            <div class="h-1 bg-slate-800 rounded-full overflow-hidden">
                <div id="prog-fill" class="progress-fill"></div>
            </div>
            <button onclick="superSniff()" id="btn-main" class="w-full bg-pink-700 py-4 rounded-xl font-black hover:bg-pink-600 transition-all">
                執行強力穿透
            </button>
        </div>

        <div id="result-ui" class="pro-card p-6 hidden animate-in fade-in space-y-4">
            <div id="player-container" class="rounded-xl overflow-hidden bg-black aspect-video"></div>
            <button id="btn-dl" class="w-full bg-white text-black py-4 rounded-xl font-black">點擊獲取檔案 (另存新檔)</button>
        </div>
    </div>

    <script>
        async function superSniff() {
            let url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert("網址呢？");

            // 修正點 1：自動淨化網址 (砍掉 & 和 ? 後面的多餘參數)
            const cleanUrl = url.split(/[?&]t=/)[0].split('&')[0];
            
            const fill = document.getElementById('prog-fill');
            const btn = document.getElementById('btn-main');
            btn.disabled = true;
            btn.innerText = "正在強力穿透目標伺服器...";
            fill.style.width = "50%";

            // 修正點 2：使用更強大的 Cobalt 鏡像節點
            try {
                const res = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: cleanUrl, videoQuality: "720" })
                });
                
                const data = await res.json();
                if (data.url) {
                    fill.style.width = "100%";
                    showData(data.url);
                } else {
                    throw new Error();
                }
            } catch (e) {
                fill.style.width = "100%";
                fill.style.backgroundColor = "#ef4444";
                alert("目標網站防護過高！\n\n解決方法：\n1. 請手動刪除網址末端參數再試\n2. 若為 xHamster，請使用手機開啟本頁面測試（IP 不同）");
            } finally {
                btn.disabled = false;
                btn.innerText = "執行強力穿透";
            }
        }

        function showData(vUrl) {
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('player-container').innerHTML = `<video src="${vUrl}" controls class="w-full h-full"></video>`;
            document.getElementById('btn-dl').onclick = () => window.open(vUrl, '_blank');
        }
    </script>
</body>
</html>
