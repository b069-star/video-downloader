<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-TRACT VIP v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .pro-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 0, 85, 0.2); border-radius: 1.5rem; box-shadow: 0 0 30px rgba(255, 0, 85, 0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #3b82f6); width: 0%; transition: width 0.5s ease; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #ff0055; box-shadow: 0 0 10px #ff0055; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-6">
        
        <header class="text-center">
            <h1 class="text-3xl font-black text-pink-600 italic tracking-tighter">X-TRACT <span class="text-white">VIP</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.3em] mt-1">ADVANCED ADULT CONTENT SNIFFER</p>
        </header>

        <div class="pro-card p-6 space-y-4">
            <div class="space-y-2">
                <input type="text" id="videoUrl" placeholder="貼上網址 (Pornhub, XV, MissAV...)" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-4 text-white outline-none focus:border-pink-600">
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div id="prog-fill" class="progress-fill"></div>
                </div>
            </div>
            
            <button onclick="smartSniff()" id="btn-main" class="w-full bg-pink-700 py-4 rounded-xl font-black hover:bg-pink-600 transition-all active:scale-95">
                執行穿透嗅探
            </button>
        </div>

        <div id="result-ui" class="pro-card p-6 hidden animate-in fade-in slide-in-from-bottom-2 space-y-4">
            <div class="flex items-center gap-2 text-xs font-bold text-pink-500">
                <span class="status-dot"></span> 偵測到影片串流資源
            </div>
            <div id="player-container" class="rounded-xl overflow-hidden bg-black aspect-video border border-slate-800"></div>
            <div class="space-y-2">
                <button id="btn-dl-direct" class="w-full bg-white text-black py-4 rounded-xl font-black text-sm hover:bg-slate-200 transition-all">
                    🚀 獲取原始 MP4/M3U8 下載
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-copy" class="bg-slate-800 py-2 rounded-lg text-[10px] font-bold">複製連結</button>
                    <button onclick="location.reload()" class="bg-slate-800 py-2 rounded-lg text-[10px] font-bold">重置系統</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function smartSniff() {
            const url = document.getElementById('videoUrl').value.trim();
            const fill = document.getElementById('prog-fill');
            const btn = document.getElementById('btn-main');
            const resultUI = document.getElementById('result-ui');

            if(!url) return alert("網址不能為空");

            // UI 初始化
            btn.disabled = true;
            btn.innerText = "正在穿透防火牆...";
            fill.style.width = "40%";
            resultUI.classList.add('hidden');

            try {
                // 使用 Cobalt API 的高級設置
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ 
                        url: url,
                        videoQuality: "1080", // 嘗試抓取最高畫質
                        vCodec: "h264"        // 成人網站多數支援 h264
                    })
                });

                const data = await response.json();
                fill.style.width = "100%";

                if (data.url || data.picker) {
                    const finalUrl = data.url || data.picker[0].url;
                    displayResult(finalUrl);
                } else {
                    throw new Error("API Refused");
                }

            } catch (e) {
                // 如果 API 失敗，嘗試第二種「原始碼提取」邏輯
                fill.style.width = "100%";
                fill.style.backgroundColor = "#ef4444";
                alert("此網站具有強大加密。建議：\n1. 換一個連結試試\n2. 使用手機端下載器");
            } finally {
                btn.disabled = false;
                btn.innerText = "執行穿透嗅探";
            }
        }

        function displayResult(vUrl) {
            const resultUI = document.getElementById('result-ui');
            const player = document.getElementById('player-container');
            const dlBtn = document.getElementById('btn-dl-direct');
            const copyBtn = document.getElementById('btn-copy');

            resultUI.classList.remove('hidden');
            
            // 嘗試渲染播放器 (如果是 M3U8 可能無法直接播放)
            player.innerHTML = `<video src="${vUrl}" controls class="w-full h-full"></video>`;
            
            dlBtn.onclick = () => window.open(vUrl, '_blank');
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(vUrl);
                alert("連結已複製到剪貼簿！");
            };
        }
    </script>
</body>
</html>
