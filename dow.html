<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video X-tract Pro v1.7 | 實體檔案轉換</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .pro-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(51, 65, 85, 0.5); border-radius: 1.5rem; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.4s ease; }
        .btn-download { background: linear-gradient(90deg, #059669, #10b981); transition: 0.3s; }
        .btn-download:hover { filter: brightness(1.1); transform: translateY(-1px); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loading { animation: pulse 1s infinite; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-6">
        
        <header class="text-center">
            <h1 class="text-2xl font-black text-blue-500 uppercase italic">X-Tract <span class="text-white">Final</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] mt-1">STREAM TO FILE CONVERTER</p>
        </header>

        <div class="pro-card p-6 space-y-4">
            <div class="space-y-2">
                <input type="text" id="videoUrl" placeholder="貼上影片網址 (YouTube, Twitter, FB...)" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500">
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div id="prog-fill" class="progress-fill"></div>
                </div>
            </div>
            
            <button onclick="startProcess()" id="btn-main" class="w-full bg-blue-600 py-3 rounded-xl font-black hover:bg-blue-500 transition-all">
                掃描並轉換檔案
            </button>
        </div>

        <div id="result-ui" class="pro-card p-6 hidden space-y-4 shadow-2xl">
            <div id="player-container" class="rounded-xl overflow-hidden bg-black aspect-video border border-slate-800"></div>
            
            <div class="space-y-2">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">可用操作</p>
                <button id="btn-download" class="btn-download w-full py-4 rounded-xl font-black text-white flex items-center justify-center gap-2">
                    <span id="dl-text">立即下載 MP4 檔案</span>
                </button>
                <p id="dl-hint" class="text-[9px] text-center text-slate-500 italic">若點擊無反應，請長按按鈕選擇「下載連結內容」</p>
            </div>
        </div>
    </div>

    <script>
        async function startProcess() {
            const url = document.getElementById('videoUrl').value.trim();
            const fill = document.getElementById('prog-fill');
            const btn = document.getElementById('btn-main');
            const resultUI = document.getElementById('result-ui');

            if(!url) return alert("請輸入網址");

            // UI Reset
            btn.disabled = true;
            btn.innerText = "正在掃描網頁代碼...";
            fill.style.width = "20%";
            resultUI.classList.add('hidden');

            try {
                // 1. 調用解析引擎
                const res = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: url, videoQuality: "720" })
                });

                const data = await res.json();
                fill.style.width = "60%";

                if (data.url) {
                    prepareDownload(data.url);
                } else {
                    throw new Error("無法提取影片");
                }
            } catch (e) {
                alert("解析失敗，請確認該影片是否為公開內容。");
                fill.style.width = "0%";
            } finally {
                btn.disabled = false;
                btn.innerText = "掃描並轉換檔案";
            }
        }

        function prepareDownload(vUrl) {
            const fill = document.getElementById('prog-fill');
            const resultUI = document.getElementById('result-ui');
            const player = document.getElementById('player-container');
            const dlBtn = document.getElementById('btn-download');
            const dlText = document.getElementById('dl-text');

            fill.style.width = "100%";
            resultUI.classList.remove('hidden');

            // 顯示預覽
            player.innerHTML = `<video src="${vUrl}" controls class="w-full h-full"></video>`;

            // 強制轉下載邏輯 (Blob 技術)
            dlBtn.onclick = async () => {
                dlText.innerText = "正在封裝檔案...";
                dlBtn.classList.add('loading');
                
                try {
                    // 這裡的 fetch 是為了將數據轉為 Blob，確保瀏覽器跳出「下載保存」視窗
                    const response = await fetch(vUrl);
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = `video_${Date.now()}.mp4`; // 強制指定副檔名
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                    
                    dlText.innerText = "下載已開始！";
                } catch (e) {
                    // 如果跨域下載失敗，則降級為直接開啟
                    window.open(vUrl, '_blank');
                    dlText.innerText = "請在開啟的頁面點擊右鍵另存";
                } finally {
                    dlBtn.classList.remove('loading');
                }
            };
        }
    </script>
</body>
</html>
